{{ define "main" }}
<section class="hero" style="padding-top:40px;">
  <div class="hero-eyebrow">{{ .Section | title }}</div>
  <h1 style="font-size:2rem;">{{ .Title }}</h1>
</section>
<section class="block">
  {{ if .Params.placeholder }}
  <div class="placeholder-note">
    &#9888; Placeholder &mdash; replace this content in <code>content/{{ .Section }}/_index.md</code> with real information before publishing.
  </div>
  {{ end }}
  {{ .Content }}
</section>
{{ end }}
